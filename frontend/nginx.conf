# Serves the Vite build and proxies the API to the backend service.
# Referenced by frontend/Dockerfile (COPY nginx.conf ...).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the app shell, so users pick up new deploys immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Hashed Vite assets are immutable and safe to cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend service on the compose network.
    # 'backend' resolves via Docker DNS; the app is built with
    # VITE_API_BASE_URL=/api so all calls land here.
    location /api/ {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # TRUST_PROXY=true on the backend honours this for rate limiting.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history fallback: unknown paths return index.html so client-side
    # routing (react-router BrowserRouter) works on deep links / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
